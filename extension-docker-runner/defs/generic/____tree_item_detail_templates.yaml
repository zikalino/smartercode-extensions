- item-types: '*'
  definition:
    type: section
    title: Basic Information
    subitems:
      - type: 'info-row'
        icon: 'codicon-symbol-field'
        color: 'black'
        label: 'ID'
        value: '${id}'
      - type: 'row'
        subitems: 
          - type: 'field'
            icon: 'codicon-symbol-string'
            color: 'black'
            label: 'Name:'
            value: '${name}'
          - type: 'field'
            icon: 'codicon-symbol-string'
            color: 'black'
            label: 'Type:'
            value: '${type}'
          - type: 'field'
            icon: 'codicon-location'
            color: 'black'
            label: 'Location:'
            value: '${location}'

- item-types: vm
  definition:
    type: section
    title: Virtual Machine
    subitems:
      - type: row
        subitems:
          - type: field
            icon: icon-square-orange.png
            color: black
            label: 'State:'
            value: '${state}'
      - type: 'row'
        subitems:
          - type: field
            icon: icon-cores.png
            color: black
            label: 'Cores:'
            value: '${size_cores}'
          - type: field
            icon: 'icon-memory.png'
            color: black
            label: 'Memory:'
            value: '${size_memory}'
          - type: field
            icon: icon-storage.png
            color: black
            label: 'Disk Size:'
            value: '${size_disk}'
      - type: 'row'
        subitems:
          - type: info-row
            icon: codicon-file-binary
            color: black
            label: 'Image:'
            value: '${image}'

- item-types:
    - container-registry
  definition:
    type: section
    title: Container Registry
    subitems:
      - type: row
        subitems:
          - type: field
            icon: codicon-cloud
            color: black
            label: 'Provider:'
            value: '${provider}'
          - type: field
            icon: codicon-location
            color: black
            label: 'Location:'
            value: '${location}'
      - type: row
        subitems:
          - type: info-row
            icon: codicon-calendar
            color: black
            label: 'Created At:'
            value: '${createdAt}'
          - type: info-row
            icon: codicon-history
            color: black
            label: 'Updated At:'
            value: '${updatedAt}'
      - type: row
        subitems:
          - type: info-row
            icon: codicon-server-environment
            color: black
            label: 'Resource Group:'
            value: '${resourceGroup}'
          - type: info-row
            icon: codicon-folder-library
            color: black
            label: 'Project ID:'
            value: '${projectId}'
      - type: row
        subitems:
          - type: info-row
            icon: codicon-vm
            color: black
            label: 'VM Name:'
            value: '${vmName}'
