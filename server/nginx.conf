# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name smartercode.eu www.smartercode.eu;

    # Allow Let's Encrypt ACME challenge for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — serves game at / and portal at /portal
server {
    listen 443 ssl;
    server_name smartercode.eu www.smartercode.eu;

    ssl_certificate /etc/letsencrypt/live/smartercode.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartercode.eu/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Portal — proxied to the portal service on port 8080
    location /portal {
        proxy_pass http://portal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Game — proxied to the game service on port 3000
    location / {
        proxy_pass http://game:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
